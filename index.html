<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0707" />
    <meta name="description" content="Интерактивная главная страница EG — проведите курсором, чтобы оживить сцену." />
    <title>EG — Reveal the extraordinary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero" id="hero" aria-label="Интерактивная сцена EG">
      <div class="scene" aria-hidden="true">
        <img class="scene__image scene__base" src="assets/base.jpg" alt="" draggable="false" />
        <img class="scene__image scene__reveal" src="assets/reveal.jpg" alt="" draggable="false" />
        <div class="scene__shade"></div>
      </div>

      <header class="nav">
        <a class="brand" href="#" aria-label="EG — на главную">
          <span class="brand__mark">EG</span>
          <span class="brand__name">Eternal<br />Growth</span>
        </a>
        <nav class="nav__links" aria-label="Главная навигация">
          <a href="#story">История</a>
          <a href="#vision">Видение</a>
          <a href="#contact">Контакты</a>
        </nav>
        <button class="menu" type="button" aria-label="Открыть меню">
          <span></span><span></span>
        </button>
      </header>

      <section class="hero__copy" id="story">
        <p class="eyebrow"><span></span> Explore what lies beneath</p>
        <h1>From stone,<br /><em>life emerges.</em></h1>
        <p class="intro">Проведите курсором по сцене,<br />чтобы раскрыть её вторую природу.</p>
      </section>

      <div class="hint" aria-hidden="true">
        <span class="hint__line"></span>
        <span>Двигайте курсор</span>
      </div>

      <div class="cursor" aria-hidden="true">
        <span class="cursor__dot"></span>
        <span class="cursor__label">Reveal</span>
      </div>

      <p class="counter" aria-hidden="true">01 <span>/</span> 02</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
